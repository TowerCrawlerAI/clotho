name: release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build the package
# and publish a GitHub Release with the sdist + wheel attached.
#
# Consumers (stdlib / sample-dungeon lowering CI) pin to a released version via:
#   pip install "fml_parser @ git+https://github.com/TowerCrawlerAI/clotho@v0.1.0"
# or by downloading the wheel asset from the Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
